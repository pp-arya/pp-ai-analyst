# Metric: Cart Abandonment Rate
id: cart_abandonment_rate
name: "Cart Abandonment Rate"
category: conversion
owner: "Product / Checkout Team"

definition:
  description: "Percentage of sessions with add-to-cart that do not complete checkout"
  formula: "1 - (sessions with order / sessions with add_to_cart)"
  unit: percentage
  direction: lower_is_better
  granularity: daily

source:
  tables: [events, orders, sessions]
  notes: "add_to_cart event from events table, order completion from orders."

dimensions:
  - device_primary
  - category
  - country

guardrails:
  - metric: conversion_rate
    direction: "inversely related — lower abandonment should raise conversion"
  - metric: aov
    direction: "monitor for correlation with cart value"

typical_range:
  min: 0.50
  max: 0.85
  novamart_baseline: 0.70

validation_status: seed
last_validated: null
