# Metric: 90-Day Lifetime Value
id: ltv_90d
name: "90-Day LTV"
category: monetization
owner: "Finance / Growth"

definition:
  description: "Total revenue per user within 90 days of signup"
  formula: "SUM(order_total) per user within 90 days of signup_date"
  unit: currency_usd
  direction: higher_is_better
  granularity: monthly_cohort

source:
  tables: [users, orders]
  join: "users.user_id = orders.user_id"
  filter: "order_date <= signup_date + INTERVAL '90 days' AND status = 'completed'"

dimensions:
  - acquisition_channel
  - device_primary
  - plan_type
  - country

guardrails:
  - metric: retention_d7
    direction: "LTV should correlate with early retention"
  - metric: aov
    direction: "LTV = AOV * frequency; monitor both"

typical_range:
  min: 0
  max: 500
  novamart_baseline: 85

validation_status: seed
last_validated: null
