# Metric: Net Promoter Score
id: nps
name: "Net Promoter Score"
category: satisfaction
owner: "Customer Experience"

definition:
  description: "Percentage of promoters (9-10) minus percentage of detractors (0-6) from survey responses"
  formula: "(COUNT(score >= 9) - COUNT(score <= 6)) / COUNT(responses) * 100"
  unit: score
  direction: higher_is_better
  granularity: monthly

source:
  tables: [surveys]
  numerator_sql: "Promoters (9-10) minus Detractors (0-6)"
  notes: "Survey table may have sparse coverage. Check response rate before using."

dimensions:
  - device_primary
  - plan_type
  - country

guardrails:
  - metric: retention_d7
    direction: "NPS should correlate with retention"

typical_range:
  min: -100
  max: 100
  novamart_baseline: 35

validation_status: seed
last_validated: null
