# Metric: Daily Active Users
id: dau
name: "Daily Active Users"
category: engagement
owner: "Product Team"

definition:
  description: "Count of distinct users with at least one session in a calendar day"
  formula: "COUNT(DISTINCT user_id) per day"
  unit: count
  direction: higher_is_better
  granularity: daily

source:
  tables: [sessions]
  numerator_sql: "COUNT(DISTINCT user_id)"
  group_by: "DATE(session_start)"

dimensions:
  - device_primary
  - country
  - acquisition_channel

guardrails:
  - metric: revenue
    direction: "DAU growth without revenue growth signals engagement quality issue"

typical_range:
  min: null
  max: null
  novamart_baseline: "~8K-12K"

validation_status: seed
last_validated: null
