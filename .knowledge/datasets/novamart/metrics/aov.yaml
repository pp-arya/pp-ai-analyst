# Metric: Average Order Value
id: aov
name: "Average Order Value"
category: monetization
owner: "Product / Merchandising"

definition:
  description: "Average revenue per completed order"
  formula: "SUM(order_total) / COUNT(DISTINCT order_id)"
  unit: currency_usd
  direction: higher_is_better
  granularity: daily

source:
  tables: [orders]
  numerator_sql: "SUM(order_total)"
  denominator_sql: "COUNT(DISTINCT order_id)"
  filter: "status = 'completed'"

dimensions:
  - category
  - device_primary
  - plan_type

guardrails:
  - metric: conversion_rate
    direction: "should not decrease as AOV increases"

typical_range:
  min: 20
  max: 200
  novamart_baseline: 65

validation_status: seed
last_validated: null
