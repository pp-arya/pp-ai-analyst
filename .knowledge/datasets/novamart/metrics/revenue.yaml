# Metric: Revenue
id: revenue
name: "Gross Revenue"
category: monetization
owner: "Finance / Product"

definition:
  description: "Total revenue from completed orders before refunds"
  formula: "SUM(order_total) for completed orders"
  unit: currency_usd
  direction: higher_is_better
  granularity: daily

source:
  tables: [orders]
  numerator_sql: "SUM(order_total)"
  filter: "status = 'completed'"

dimensions:
  - category
  - device_primary
  - country
  - acquisition_channel

guardrails:
  - metric: aov
    direction: "monitor for mix shift"
  - metric: conversion_rate
    direction: "should not decline while revenue grows"

typical_range:
  min: null
  max: null
  novamart_baseline: "~$3.5M annual"

validation_status: seed
last_validated: null
