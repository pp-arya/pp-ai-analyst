# Metric: Conversion Rate
id: conversion_rate
name: "Purchase Conversion Rate"
category: acquisition
owner: "Growth Team"

definition:
  description: "Percentage of sessions that result in at least one completed order"
  formula: "COUNT(DISTINCT sessions with order) / COUNT(DISTINCT sessions)"
  unit: percentage
  direction: higher_is_better
  granularity: daily

source:
  tables: [sessions, orders]
  join: "sessions.session_id = orders.session_id"
  numerator_sql: "COUNT(DISTINCT CASE WHEN o.order_id IS NOT NULL THEN s.session_id END)"
  denominator_sql: "COUNT(DISTINCT s.session_id)"

dimensions:
  - device_primary
  - acquisition_channel
  - country

guardrails:
  - metric: aov
    direction: "should not decrease significantly"
  - metric: cart_abandonment_rate
    direction: "should decrease or stay flat"

typical_range:
  min: 0.01
  max: 0.10
  novamart_baseline: 0.035

validation_status: seed
last_validated: null
