# Metric: 7-Day Retention
id: retention_d7
name: "7-Day Retention Rate"
category: retention
owner: "Growth Team"

definition:
  description: "Percentage of users who return within 7 days of their first session"
  formula: "COUNT(users active on day 7) / COUNT(users in cohort)"
  unit: percentage
  direction: higher_is_better
  granularity: weekly_cohort

source:
  tables: [sessions, users]
  join: "sessions.user_id = users.user_id"
  notes: "Cohort = signup week. Active = any session on day 7 (±1 day)."

dimensions:
  - device_primary
  - acquisition_channel
  - country

guardrails:
  - metric: dau
    direction: "retention improvement should lift DAU over time"

typical_range:
  min: 0.10
  max: 0.50
  novamart_baseline: 0.25

validation_status: seed
last_validated: null
